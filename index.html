<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motion Design Portfolio</title>
    <link rel="stylesheet" href="cs2.css">
</head>
<body>
    <div class="grain-overlay"></div>

    <header class="hero">
        <div class="horizontal-tear-frame">
            <nav class="nav-stickers">
                <a href="#projects"><img src="images/projects-pill.png" class="sticker" alt="Projects"></a>
                <a href="#about"><img src="images/about-pill.png" class="sticker" alt="About"></a>
            </nav>
            <p class="scroll-tag">scroll down for more</p>
        </div>
        <div class="hero-content">
            <img src="images/portfolio-title.png" class="title-img" alt="PORTFOLIO">
        </div>
    </header>

    <section id="projects" class="projects">
        <div class="grid">
            <a href="projeto1.html" class="card">
                <img src="images/skater.png" alt="Skater Project">
                <div class="card-overlay">
                    <span>SUMOL AD</span>
                </div>
            </a>
            <a href="projeto2.html" class="card">
                <img src="images/barcode.png" alt="Barcode Project">
                <div class="card-overlay">
                    <span>IDENTIFIED</span>
                </div>
            </a>
            <a href="projeto3.html" class="card">
                <img src="images/abstract.png" alt="Abstract Project">
                <div class="card-overlay">
                    <span>SOCIAL ANXIETY</span>
                </div>
            </a>
            <a href="projeto4.html" class="card">
                <img src="images/gatoimagem.png" alt="Black Image Project">
                <div class="card-overlay">
                    <span>REEL</span>
                </div>
            </a>
        </div>
    </section>

    <section id="about" class="about">
        <div class="profile-wrapper">
            <img src="images/about-pill.png" class="bio-pill-floating" alt="About Me">
            <img src="images/profile.png" class="profile-photo" alt="Profile">
        </div>
        <div class="side-tear-frame">
    <img src="images/finalrasgado.png" class="profiletext-photo" alt="Profiletext">
        </div>
    </section>
</body>
</html>
